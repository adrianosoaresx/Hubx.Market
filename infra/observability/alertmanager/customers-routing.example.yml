route:
  receiver: customers-ops
  group_by:
    - alertname
    - tenant_id
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  matchers:
    - domain="customers"

receivers:
  - name: customers-ops
    webhook_configs:
      - url: https://example.invalid/alertmanager/customers
        send_resolved: true
