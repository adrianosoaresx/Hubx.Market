{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-color-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hubx Market{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}?v=ds-public-flows-20260702-4">
    <link rel="icon" href="{% static 'img/brand/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/brand/hubx-favicon-32.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/brand/apple-touch-icon.png' %}">
    <script>
        (function () {
            var storedTheme = null;
            try {
                storedTheme = localStorage.getItem("hubx-color-theme");
            } catch (error) {
                storedTheme = null;
            }
            var theme = storedTheme === "dark" || storedTheme === "light"
                ? storedTheme
                : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.colorTheme = theme;
        })();
    </script>
    <script defer src="{% static 'js/htmx.min.js' %}"></script>
    <script defer src="{% static 'js/alpine.min.js' %}"></script>
    <script defer src="{% static 'js/app.js' %}"></script>
    {% block head %}{% endblock %}
</head>
<body
    class="min-h-screen bg-[var(--color-surface-page)] text-[var(--color-text-primary)] {% block body_class %}{% endblock %}"
    data-ui-context="{% block ui_context %}admin{% endblock %}"
    data-tenant="{% block tenant_theme %}default{% endblock %}"
>
    {% include "shared/partials/flash_messages.html" %}
    {% block body %}{% endblock %}
</body>
</html>
