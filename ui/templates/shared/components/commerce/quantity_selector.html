<div class="inline-flex items-center rounded-xl border border-[var(--color-border-default)] bg-[var(--color-surface-panel)]">
    <button
        type="{{ decrement_type|default:'button' }}"
        class="px-3 py-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] {% if disabled %}pointer-events-none opacity-50{% endif %}"
        {% if disabled %}disabled{% endif %}
    >
        -
    </button>
    <span class="min-w-12 border-x border-[var(--color-border-default)] px-3 py-2 text-center text-sm font-medium text-[var(--color-text-primary)]">
        {{ value|default:"1" }}
    </span>
    <button
        type="{{ increment_type|default:'button' }}"
        class="px-3 py-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] {% if disabled %}pointer-events-none opacity-50{% endif %}"
        {% if disabled %}disabled{% endif %}
    >
        +
    </button>
</div>
