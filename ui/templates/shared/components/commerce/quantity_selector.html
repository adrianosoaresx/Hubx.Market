<div class="ds-quantity-selector {% if size == 'sm' or compact %}ds-quantity-selector-sm{% endif %} {% if disabled %}is-disabled{% endif %}">
    <button
        type="{{ decrement_type|default:'button' }}"
        class="ds-quantity-btn"
        aria-label="{{ decrement_label|default:'Diminuir quantidade' }}"
        {% if disabled %}disabled{% endif %}
    >
        -
    </button>
    <span class="ds-quantity-value" aria-live="polite">
        {{ value|default:"1" }}
    </span>
    <button
        type="{{ increment_type|default:'button' }}"
        class="ds-quantity-btn"
        aria-label="{{ increment_label|default:'Aumentar quantidade' }}"
        {% if disabled %}disabled{% endif %}
    >
        +
    </button>
</div>
