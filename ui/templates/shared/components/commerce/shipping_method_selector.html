{% if methods or showcase_mode %}
<div class="ds-choice-list">
    {% if methods %}
    {% for method in methods %}
        <label class="ds-choice-card {% if method.checked or method.value == selected %}is-selected{% endif %} {% if method.disabled %}is-disabled{% endif %}" {% if method.disabled %}aria-disabled="true"{% endif %}>
            <input
                type="radio"
                name="{{ name|default:'shipping_method' }}"
                value="{{ method.value }}"
                class="ds-choice-radio"
                {% if method.checked or method.value == selected %}checked{% endif %}
                {% if method.disabled %}disabled{% endif %}
            >
            <div class="ds-choice-copy">
                <div class="ds-choice-row">
                    <div>
                        <p class="ds-choice-title">{{ method.label }}</p>
                        {% if method.description %}
                            <p class="ds-choice-description">{{ method.description }}</p>
                        {% endif %}
                    </div>
                    {% include "shared/components/commerce/price_display.html" with value=method.price size="sm" align="right" %}
                </div>
                {% if method.meta %}
                    <p class="ds-choice-meta">{{ method.meta }}</p>
                {% endif %}
            </div>
        </label>
    {% endfor %}
    {% else %}
        <label class="ds-choice-card is-selected">
            <input type="radio" name="{{ name|default:'shipping_method' }}" value="standard" class="ds-choice-radio" checked>
            <div class="ds-choice-copy">
                <div class="ds-choice-row">
                    <div>
                        <p class="ds-choice-title">Entrega padrão</p>
                        <p class="ds-choice-description">Receba entre 3 e 5 dias úteis.</p>
                    </div>
                    {% include "shared/components/commerce/price_display.html" with value="R$ 24,90" size="sm" align="right" %}
                </div>
                <p class="ds-choice-meta">Frete econômico com rastreamento.</p>
            </div>
        </label>
        <label class="ds-choice-card">
            <input type="radio" name="{{ name|default:'shipping_method' }}" value="express" class="ds-choice-radio">
            <div class="ds-choice-copy">
                <div class="ds-choice-row">
                    <div>
                        <p class="ds-choice-title">Entrega expressa</p>
                        <p class="ds-choice-description">Receba no próximo dia útil.</p>
                    </div>
                    {% include "shared/components/commerce/price_display.html" with value="R$ 39,90" size="sm" align="right" %}
                </div>
                <p class="ds-choice-meta">Disponível para capitais e regiões selecionadas.</p>
            </div>
        </label>
    {% endif %}
</div>
{% endif %}
