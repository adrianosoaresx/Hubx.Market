{% if methods %}
<div class="ds-choice-list">
    {% for method in methods %}
        <label class="ds-choice-card {% if method.checked or method.value == selected %}is-selected{% endif %} {% if method.disabled %}is-disabled{% endif %}" {% if method.disabled %}aria-disabled="true"{% endif %}>
            <input
                type="radio"
                name="{{ name|default:'payment_method' }}"
                value="{{ method.value }}"
                class="ds-choice-radio"
                {% if method.checked or method.value == selected %}checked{% endif %}
                {% if method.disabled %}disabled{% endif %}
            >
            <div class="ds-choice-copy">
                <div class="ds-choice-heading">
                    <p class="ds-choice-title">{{ method.label }}</p>
                    {% if method.badge %}
                        {% include "shared/components/data_display/badge.html" with label=method.badge size="xs" variant=method.badge_variant|default:"neutral" %}
                    {% endif %}
                </div>
                {% if method.description %}
                    <p class="ds-choice-description">{{ method.description }}</p>
                {% endif %}
                {% if method.meta %}
                    <p class="ds-choice-meta">{{ method.meta }}</p>
                {% endif %}
            </div>
        </label>
    {% endfor %}
</div>
{% endif %}
