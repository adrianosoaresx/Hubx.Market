{% if open %}
{% with drawer_id=id|default:"ds-drawer" %}
<div class="ds-drawer-backdrop"></div>
<aside class="ds-drawer {% if size == 'lg' %}ds-drawer-lg{% endif %}" role="dialog" aria-modal="true" aria-labelledby="{{ drawer_id }}-title" {% if description %}aria-describedby="{{ drawer_id }}-description"{% endif %}>
    <header class="ds-drawer-header">
        <div>
            <h2 id="{{ drawer_id }}-title" class="ds-drawer-title">{{ title|default:"Painel" }}</h2>
            {% if description %}<p id="{{ drawer_id }}-description" class="ds-drawer-description">{{ description }}</p>{% endif %}
        </div>
        {% if dismissible %}
            <button type="button" class="ds-drawer-dismiss" aria-label="Fechar painel">Fechar</button>
        {% endif %}
    </header>

    <div class="ds-drawer-body">
        {{ body|default:"Conteúdo do drawer" }}
    </div>

    {% if footer %}
        <footer class="ds-drawer-footer">
            {{ footer }}
        </footer>
    {% endif %}
</aside>
{% endwith %}
{% endif %}
