{% if open %}
<div class="fixed inset-0 z-40 bg-slate-950/40"></div>
<aside class="fixed inset-y-0 right-0 z-50 flex w-full max-w-md flex-col border-l border-[var(--color-border-default)] bg-[var(--color-surface-panel)] shadow-2xl">
    <header class="flex items-start justify-between gap-4 border-b border-[var(--color-border-default)] px-6 py-4">
        <div>
            <h2 class="text-lg font-semibold text-[var(--color-text-primary)]">{{ title|default:"Painel" }}</h2>
            {% if description %}<p class="mt-1 text-sm text-[var(--color-text-secondary)]">{{ description }}</p>{% endif %}
        </div>
        {% if dismissible %}
            <button type="button" class="text-sm text-[var(--color-text-secondary)]">Fechar</button>
        {% endif %}
    </header>

    <div class="min-h-0 flex-1 overflow-y-auto px-6 py-5">
        {{ body|default:"Conteúdo do drawer" }}
    </div>

    {% if footer %}
        <footer class="border-t border-[var(--color-border-default)] px-6 py-4">
            {{ footer }}
        </footer>
    {% endif %}
</aside>
{% endif %}
