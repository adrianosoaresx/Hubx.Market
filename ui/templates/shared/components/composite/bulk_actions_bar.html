{% if selection_count %}
<section class="ds-bulk-actions-bar">
    <div class="ds-bulk-actions-copy">
        {% include "shared/components/data_display/badge.html" with label=selection_count variant="neutral" %}
        <p>{{ selection_count }} item(ns) selecionado(s)</p>
    </div>

    {% if actions %}
        <div class="ds-bulk-actions">
            {{ actions }}
        </div>
    {% endif %}
</section>
{% endif %}
