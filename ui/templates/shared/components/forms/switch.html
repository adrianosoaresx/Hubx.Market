<label class="flex items-start justify-between gap-4 {% if disabled %}cursor-not-allowed opacity-60{% else %}cursor-pointer{% endif %}">
    <span class="space-y-1">
        <span class="block text-sm font-medium text-[var(--color-text-primary)]">{{ label|default:"Alternar" }}</span>
        {% if description %}
            <span class="block text-sm text-[var(--color-text-secondary)]">{{ description }}</span>
        {% endif %}
        {% if invalid and error_text %}
            {% include "shared/components/forms/field_error.html" with text=error_text %}
        {% endif %}
    </span>
    <span class="relative inline-flex items-center">
        <input
            id="{{ id|default:name }}"
            name="{{ name }}"
            type="checkbox"
            value="{{ value|default:'1' }}"
            class="peer sr-only"
            {% if checked %}checked{% endif %}
            {% if disabled %}disabled{% endif %}
        >
        <span class="h-6 w-11 rounded-full bg-slate-300 transition peer-checked:bg-[var(--color-action-primary-bg)]"></span>
        <span class="pointer-events-none absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition peer-checked:translate-x-5"></span>
    </span>
</label>
