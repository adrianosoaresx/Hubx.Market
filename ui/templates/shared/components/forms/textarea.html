<div class="space-y-2">
    {% if label %}
        <label for="{{ id|default:name }}" class="block text-sm font-medium text-[var(--color-text-primary)]">
            {{ label }}
        </label>
    {% endif %}
    <textarea
        id="{{ id|default:name }}"
        name="{{ name }}"
        rows="{{ rows|default:'4' }}"
        placeholder="{{ placeholder|default:'' }}"
        class="ds-input min-h-[7rem] resize-y {% if invalid %}!border-[var(--color-feedback-danger)]{% endif %} {% if disabled %}cursor-not-allowed bg-slate-50 text-slate-400{% endif %}"
        {% if required %}required{% endif %}
        {% if disabled %}disabled{% endif %}
        {% if readonly %}readonly{% endif %}
    >{{ value|default:'' }}</textarea>
    {% if help_text and not invalid %}
        {% include "shared/components/forms/field_help.html" with text=help_text %}
    {% endif %}
    {% if invalid and error_text %}
        {% include "shared/components/forms/field_error.html" with text=error_text %}
    {% endif %}
</div>
