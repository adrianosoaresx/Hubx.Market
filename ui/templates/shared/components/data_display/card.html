<section class="ds-surface {% if padding == 'lg' %}p-8{% else %}p-6{% endif %} {% if clickable %}transition hover:-translate-y-0.5 hover:shadow-md{% endif %}">
    {% if title or actions %}
        <header class="mb-4 flex items-start justify-between gap-4">
            <div>
                {% if title %}<h3 class="text-base font-semibold text-[var(--color-text-primary)]">{{ title }}</h3>{% endif %}
                {% if subtitle %}<p class="mt-1 text-sm text-[var(--color-text-secondary)]">{{ subtitle }}</p>{% endif %}
            </div>
            {% if actions %}<div>{{ actions }}</div>{% endif %}
        </header>
    {% endif %}
    <div class="space-y-4">
        {% block card_body %}
            {{ content|default:"Conteúdo do card" }}
        {% endblock %}
    </div>
    {% if footer %}
        <footer class="mt-6 border-t border-[var(--color-border-default)] pt-4 text-sm text-[var(--color-text-secondary)]">
            {{ footer }}
        </footer>
    {% endif %}
</section>
