<section class="ds-card ds-surface {% if padding == 'lg' %}ds-card-lg{% endif %} {% if clickable %}ds-card-interactive{% endif %}">
    {% if title or actions %}
        <header class="ds-card-header">
            <div>
                {% if title %}<h3 class="ds-card-title">{{ title }}</h3>{% endif %}
                {% if subtitle %}<p class="ds-card-subtitle">{{ subtitle }}</p>{% endif %}
            </div>
            {% if actions %}<div class="ds-card-actions">{{ actions }}</div>{% endif %}
        </header>
    {% endif %}
    <div class="ds-card-body">
        {% block card_body %}
            {{ content|default:"Conteúdo do card" }}
        {% endblock %}
    </div>
    {% if footer %}
        <footer class="ds-card-footer">
            {{ footer }}
        </footer>
    {% endif %}
</section>
