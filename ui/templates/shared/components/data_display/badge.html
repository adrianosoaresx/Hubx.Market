{% with variant=variant|default:"neutral" size=size|default:"sm" %}
<span
    class="ds-badge {% if size == 'xs' %}ds-badge-xs{% endif %} {% if variant == 'success' or variant == 'active' or variant == 'paid' or variant == 'delivered' %}ds-badge-success{% elif variant == 'warning' or variant == 'pending' %}ds-badge-warning{% elif variant == 'danger' or variant == 'inactive' or variant == 'canceled' %}ds-badge-danger{% elif variant == 'info' or variant == 'shipped' %}ds-badge-info{% else %}ds-badge-neutral{% endif %}"
>
    {% if icon_name %}
        {% include "shared/partials/icon.html" with name=icon_name size="sm" %}
    {% elif icon %}
        <span aria-hidden="true">{{ icon }}</span>
    {% endif %}
    <span>{{ label|default:variant|title }}</span>
</span>
{% endwith %}
