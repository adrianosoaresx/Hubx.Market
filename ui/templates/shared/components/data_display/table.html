<div {% if table_id %}id="{{ table_id }}"{% endif %} class="ds-table-shell">
    <div class="ds-table-scroll">
        <table class="ds-table" {% if table_label %}aria-label="{{ table_label }}"{% endif %}>
            {% if caption %}<caption class="sr-only">{{ caption }}</caption>{% endif %}
            <thead class="ds-table-head">
                <tr>
                    {% for column in columns %}
                        <th scope="col" class="ds-table-th">{{ column.label }}</th>
                    {% empty %}
                        <th scope="col" class="ds-table-th">Coluna</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody class="ds-table-body">
                {% for row in rows %}
                    <tr class="ds-table-row">
                        {% for cell in row.cells %}
                            <td class="ds-table-cell">{{ cell }}</td>
                        {% endfor %}
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="{{ columns|length|default:'1' }}" class="ds-table-empty">
                            {{ empty_message|default:"Nenhum registro encontrado." }}
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
