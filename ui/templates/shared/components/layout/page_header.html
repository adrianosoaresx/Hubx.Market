<header class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
    <div class="space-y-2">
        {% if eyebrow %}
            <p class="text-sm font-medium text-[var(--color-text-secondary)]">{{ eyebrow }}</p>
        {% endif %}
        <div class="space-y-1">
            <h1 class="{% if size == 'lg' %}text-3xl{% else %}text-2xl{% endif %} font-semibold text-[var(--color-text-primary)]">
                {{ title|default:"Título da página" }}
            </h1>
            {% if description %}
                <p class="max-w-3xl text-sm text-[var(--color-text-secondary)]">{{ description }}</p>
            {% endif %}
        </div>
        {% if meta %}
            <div class="text-sm text-[var(--color-text-secondary)]">{{ meta }}</div>
        {% endif %}
    </div>

    {% if actions %}
        <div class="flex flex-wrap items-center gap-3">
            {{ actions }}
        </div>
    {% endif %}
</header>
